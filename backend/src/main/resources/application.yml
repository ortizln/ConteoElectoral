server:
  port: 8080

spring:
  application:
    name: conteo-electoral
  datasource:
    url: jdbc:postgresql://localhost:5432/conteo_electoral
    username: postgres
    password: 12345
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

# JWT Configuration - Base64 encoded secret key (minimum 256 bits)
jwt:
  secret: bXlTZWNyZXRLZXlGb3JKV1RUb2tlbkdlbmVyYXRpb25hbmRWYWxpZGF0aW9uMjAyNENvbnRlby1FbGVjdG9yYWxTeXN0ZW0=
  expiration: 86400000  # 24 hours in milliseconds

# CORS Configuration
cors:
  allowed-origins: http://localhost:4200

# Logging
logging:
  level:
    root: INFO
    com.electoral: DEBUG
    org.springframework.security: DEBUG

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html