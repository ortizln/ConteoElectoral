spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

jwt:
  secret: testSecretKeyForJWTTokenGenerationAndValidationForTestingPurposes2024
  expiration: 86400000

logging:
  level:
    com.electoral: DEBUG
