server {
    listen 80;
    server_name 192.168.100.215 conteo-electoral;

    root /var/www/conteo-electoral/browser/;
    index index.html index.htm;

   # Redirigir de /conteo-electoral a /conteo-electoral/ automáticamente
    location = /conteo-electoral {
        return 301 http://$host$request_uri/;
    }

    location /conteo-electoral/ {
        alias /var/www/conteo-electoral/browser/;
        index index.html;
        try_files $uri $uri/ /conteo-electoral/index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:8081/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
