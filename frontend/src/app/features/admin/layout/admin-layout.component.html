<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Conteo Electoral</h2>
      <span class="badge bg-primary">{{ userRole }}</span>
    </div>
    
    <nav class="sidebar-nav">
      <a routerLink="elecciones" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🏛️</span>
        <span class="nav-text">Elecciones</span>
      </a>
      <a routerLink="zonas" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🌍</span>
        <span class="nav-text">Zonas</span>
      </a>
      <a routerLink="provincias" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📍</span>
        <span class="nav-text">Provincias</span>
      </a>
      <a routerLink="cantones" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🏘️</span>
        <span class="nav-text">Cantones</span>
      </a>
      <a routerLink="parroquias" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🏘️</span>
        <span class="nav-text">Parroquias</span>
      </a>
      <a routerLink="instituciones" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🏫</span>
        <span class="nav-text">Instituciones</span>
      </a>
      <a routerLink="partidos" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🎯</span>
        <span class="nav-text">Partidos</span>
      </a>
      <a routerLink="cargos" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📋</span>

      <a routerLink="candidatos" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">👤</span>
        <span class="nav-text">Candidatos</span>
      </a>
      <a routerLink="mesas" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🗳️</span>
        <span class="nav-text">Mesas</span>
      </a>
      <a routerLink="usuarios" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">👥</span>
        <span class="nav-text">Usuarios</span>
      </a>
      <a routerLink="asignar-mesas" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📝</span>
        <span class="nav-text">Asignar Mesas</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button (click)="logout()" class="btn btn-outline-danger w-100">
        Cerrar Sesión
      </button>
    </div>
  </aside>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
