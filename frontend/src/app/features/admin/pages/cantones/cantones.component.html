<div class="container">
  <div class="page-header">
    <h2>Gestión de Cantones</h2>
    <button class="btn btn-primary btn-with-icon" (click)="openModal()">
      <span class="btn-icon">+</span> Nuevo Cantón
    </button>
  </div>

  <table class="table table-striped">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Provincia</th>
        <th>Descripción</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let c of cantones">
        <td>{{ c.nombre }}</td>
        <td>{{ c.provinciaNombre }}</td>
        <td>{{ c.descripcion || 'N/A' }}</td>
        <td>
          <button class="btn btn-sm btn-warning" (click)="edit(c)">Editar</button>
          <button class="btn btn-sm btn-danger" (click)="delete(c.id)">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="modal" *ngIf="showModal">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5>{{ editMode ? 'Editar' : 'Nuevo' }} Cantón</h5>
          <button class="btn-close" (click)="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label>Nombre:</label>
            <input type="text" class="form-control" [(ngModel)]="form.nombre" />
          </div>
          <div class="mb-3">
            <label>Provincia:</label>
            <select class="form-select" [(ngModel)]="form.provinciaId">
              <option [ngValue]="null">Seleccione...</option>
              <option *ngFor="let p of provincias" [value]="p.id">{{ p.nombre }}</option>
            </select>
          </div>
          <div class="mb-3">
            <label>Descripción:</label>
            <textarea class="form-control" [(ngModel)]="form.descripcion"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" (click)="closeModal()">Cancelar</button>
          <button class="btn btn-primary" (click)="save()">Guardar</button>
        </div>
      </div>
    </div>
  </div>
</div>
