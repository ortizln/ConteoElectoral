<div class="container">
  <div class="page-header">
    <h2>Gestión de Partidos</h2>
    <button class="btn btn-primary btn-with-icon" (click)="openModal()">
      <span class="btn-icon">+</span> Nuevo Partido
    </button>
  </div>
  
  <div class="filters-bar mb-4">
    <div class="filter-item">
      <label>Elección:</label>
      <select class="form-select" (change)="load(form.eleccionesId)" [(ngModel)]="form.eleccionesId">
        <option [ngValue]="null">Seleccione...</option>
        <option *ngFor="let e of elecciones" [value]="e.id">{{ e.nombre }}</option>
      </select>
    </div>
  </div>

  <table class="table table-striped">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Sigla</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of partidos">
        <td>{{ p.nombre }}</td>
        <td><span class="badge bg-info">{{ p.sigla }}</span></td>
        <td>
          <button class="btn btn-sm btn-warning" (click)="edit(p)">Editar</button>
          <button class="btn btn-sm btn-danger" (click)="delete(p.id)">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="modal" *ngIf="showModal">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5>{{ editMode ? 'Editar' : 'Nuevo' }} Partido</h5>
          <button class="btn-close" (click)="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label>Nombre:</label>
            <input type="text" class="form-control" [(ngModel)]="form.nombre" />
          </div>
          <div class="mb-3">
            <label>Sigla:</label>
            <input type="text" class="form-control" [(ngModel)]="form.sigla" />
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" (click)="closeModal()">Cancelar</button>
          <button class="btn btn-primary" (click)="save()">Guardar</button>
        </div>
      </div>
    </div>
  </div>
</div>
