<div class="container">
  <div class="page-header">
    <h2>Gestión de Elecciones</h2>
    <button class="btn btn-primary btn-with-icon" (click)="openModal()">
      <span class="btn-icon">+</span> Nueva Elección
    </button>
  </div>
  
  <table class="table table-striped">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Fecha Inicio</th>
        <th>Fecha Fin</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let e of elecciones">
        <td>{{ e.nombre }}</td>
        <td>{{ e.descripcion || 'N/A' }}</td>
        <td>{{ e.fechaInicio | date:'shortDate' }}</td>
        <td>{{ e.fechaFin | date:'shortDate' }}</td>
        <td>
          <span [class]="e.activa ? 'badge bg-success' : 'badge bg-secondary'">
            {{ e.activa ? 'Activa' : 'Inactiva' }}
          </span>
        </td>
        <td>
          <button class="btn btn-sm btn-warning" (click)="edit(e)">Editar</button>
          <button class="btn btn-sm btn-danger" (click)="delete(e.id)">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="modal" *ngIf="showModal">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5>{{ editMode ? 'Editar' : 'Nueva' }} Elección</h5>
          <button class="btn-close" (click)="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label>Nombre:</label>
            <input type="text" class="form-control" [(ngModel)]="form.nombre" />
          </div>
          <div class="mb-3">
            <label>Descripción:</label>
            <textarea class="form-control" [(ngModel)]="form.descripcion"></textarea>
          </div>
          <div class="mb-3">
            <label>Fecha Inicio:</label>
            <input type="date" class="form-control" [(ngModel)]="form.fechaInicio" />
          </div>
          <div class="mb-3">
            <label>Fecha Fin:</label>
            <input type="date" class="form-control" [(ngModel)]="form.fechaFin" />
          </div>
          <div class="mb-3">
            <label>
              <input type="checkbox" [(ngModel)]="form.activa" /> Activa
            </label>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" (click)="closeModal()">Cancelar</button>
          <button class="btn btn-primary" (click)="save()">Guardar</button>
        </div>
      </div>
    </div>
  </div>
</div>
