<div class="page-wrapper">
  <div class="page-header">
    <h2>Carrusel de Imágenes</h2>
    <p>Administra las imágenes que se muestran en la pantalla de inicio de sesión</p>
  </div>

  <div *ngIf="successMsg" class="alert alert-success">{{ successMsg }}</div>
  <div *ngIf="errorMsg" class="alert alert-danger">{{ errorMsg }}</div>

  <div class="card upload-card">
    <h5>Agregar Nueva Imagen</h5>
    <div class="upload-form">
      <div class="form-row">
        <div class="form-group">
          <label for="newFile">Imagen</label>
          <input type="file" autocomplete="off" (change)="onFileSelected($event)" accept="image/png,image/jpeg,image/webp" id="newFile" />
          <label for="newFile" class="file-label">{{ selectedFile ? selectedFile.name : 'Seleccionar imagen...' }}</label>
        </div>
        <div class="form-group">
          <label for="newCaption">Descripción</label>
          <input id="newCaption" type="text" class="form-control" autocomplete="off" [(ngModel)]="newCaption" placeholder="Texto que se muestra en el carrusel" />
        </div>
      </div>
      <button class="btn btn-primary" (click)="uploadImage()" [disabled]="!selectedFile || uploading">
        {{ uploading ? 'Subiendo...' : 'Subir Imagen' }}
      </button>
    </div>
  </div>

  <div *ngIf="loading" class="text-center py-5"><div class="spinner-border text-primary" role="status"><span class="visually-hidden">Cargando...</span></div></div>

  <div *ngIf="!loading && images.length === 0" class="card empty-card">
    <p>No hay imágenes en el carrusel. Agrega una nueva imagen usando el formulario de arriba.</p>
  </div>

  <div *ngIf="!loading && images.length > 0" class="images-grid">
    <div *ngFor="let img of images" class="image-card">
      <div class="img-preview">
        <img [src]="getImageUrl(img.id)" [alt]="img.caption" />
      </div>
      <div class="img-info">
        <div *ngIf="editingId !== img.id" class="img-details">
          <span class="img-caption">{{ img.caption }}</span>
          <span class="img-orden">Orden: {{ img.orden }}</span>
        </div>
        <div *ngIf="editingId === img.id" class="img-edit">
          <input type="text" class="form-control form-control-sm" autocomplete="off" [(ngModel)]="editCaption" placeholder="Descripción" />
          <input type="number" class="form-control form-control-sm" autocomplete="off" [(ngModel)]="editOrden" min="0" placeholder="Orden" />
        </div>
        <div class="img-actions">
          <div *ngIf="editingId !== img.id" class="btn-group">
            <button class="btn btn-sm btn-outline-primary" (click)="startEdit(img)">Editar</button>
            <button class="btn btn-sm btn-outline-danger" (click)="deleteImage(img.id)">Eliminar</button>
          </div>
          <div *ngIf="editingId === img.id" class="btn-group">
            <button class="btn btn-sm btn-primary" (click)="saveEdit(img.id)">Guardar</button>
            <button class="btn btn-sm btn-outline-secondary" (click)="cancelEdit()">Cancelar</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
