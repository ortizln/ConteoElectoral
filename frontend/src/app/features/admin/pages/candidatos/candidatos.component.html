<div class="container">
  <div class="page-header">
    <h2>Gestión de Candidatos</h2>
    <button class="btn btn-primary btn-with-icon" (click)="openModal()">
      <span class="btn-icon">+</span> Nuevo Candidato
    </button>
  </div>
  
  <div class="filters-bar mb-4">
    <div class="filter-item">
      <label>Elección:</label>
      <select class="form-select" (change)="load(form.eleccionesId)" [(ngModel)]="form.eleccionesId">
        <option [ngValue]="null">Seleccione...</option>
        <option *ngFor="let e of elecciones" [value]="e.id">{{ e.nombre }}</option>
      </select>
    </div>
  </div>

  <table class="table table-striped">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Partido</th>
        <th>Cargo</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let c of candidatos">
        <td>{{ c.nombre }}</td>
        <td>{{ c.apellido }}</td>
        <td>{{ c.partidoNombre }}</td>
        <td>{{ c.cargoNombre }}</td>
        <td>
          <button class="btn btn-sm btn-warning" (click)="edit(c)">Editar</button>
          <button class="btn btn-sm btn-danger" (click)="delete(c.id)">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="modal" *ngIf="showModal">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5>{{ editMode ? 'Editar' : 'Nuevo' }} Candidato</h5>
          <button class="btn-close" (click)="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label>Nombre:</label>
            <input type="text" class="form-control" [(ngModel)]="form.nombre" />
          </div>
          <div class="mb-3">
            <label>Apellido:</label>
            <input type="text" class="form-control" [(ngModel)]="form.apellido" />
          </div>
          <div class="mb-3">
            <label>Partido:</label>
            <select class="form-select" [(ngModel)]="form.partidoId">
              <option [ngValue]="null">Seleccione...</option>
              <option *ngFor="let p of partidos" [value]="p.id">{{ p.nombre }}</option>
            </select>
          </div>
          <div class="mb-3">
            <label>Cargo:</label>
            <select class="form-select" [(ngModel)]="form.cargoId">
              <option [ngValue]="null">Seleccione...</option>
              <option *ngFor="let c of cargos" [value]="c.id">{{ c.nombre }}</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" (click)="closeModal()">Cancelar</button>
          <button class="btn btn-primary" (click)="save()">Guardar</button>
        </div>
      </div>
    </div>
  </div>
</div>
