<div class="container">
  <div class="page-header">
    <h2>Gestión de Instituciones Educativas</h2>
    <button class="btn btn-primary btn-with-icon" (click)="openModal()">
      <span class="btn-icon">+</span> Nueva Institución
    </button>
  </div>

  <table class="table table-striped">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Parroquia</th>
        <th>Código</th>
        <th>Tipo</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let i of instituciones">
        <td>{{ i.nombre }}</td>
        <td>{{ i.parroquiaNombre }}</td>
        <td>{{ i.codigo || 'N/A' }}</td>
        <td>{{ i.tipo || 'N/A' }}</td>
        <td>
          <button class="btn btn-sm btn-warning" (click)="edit(i)">Editar</button>
          <button class="btn btn-sm btn-danger" (click)="delete(i.id)">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="modal" *ngIf="showModal">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5>{{ editMode ? 'Editar' : 'Nueva' }} Institución</h5>
          <button class="btn-close" (click)="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label>Nombre:</label>
            <input type="text" class="form-control" [(ngModel)]="form.nombre" />
          </div>
          <div class="mb-3">
            <label>Parroquia:</label>
            <select class="form-select" [(ngModel)]="form.parroquiaId">
              <option [ngValue]="null">Seleccione...</option>
              <option *ngFor="let p of parroquias" [value]="p.id">{{ p.nombre }}</option>
            </select>
          </div>
          <div class="mb-3">
            <label>Dirección:</label>
            <textarea class="form-control" [(ngModel)]="form.direccion"></textarea>
          </div>
          <div class="mb-3">
            <label>Código:</label>
            <input type="text" class="form-control" [(ngModel)]="form.codigo" />
          </div>
          <div class="mb-3">
            <label>Tipo:</label>
            <input type="text" class="form-control" [(ngModel)]="form.tipo" />
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" (click)="closeModal()">Cancelar</button>
          <button class="btn btn-primary" (click)="save()">Guardar</button>
        </div>
      </div>
    </div>
  </div>
</div>
