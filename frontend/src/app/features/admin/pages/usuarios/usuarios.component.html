<div class="container">
  <div class="page-header">
    <h2>Gestión de Usuarios</h2>
    <button class="btn btn-primary btn-with-icon" (click)="openModal()">
      <span class="btn-icon">+</span> Nuevo Usuario
    </button>
  </div>
  
  <table class="table table-striped">
    <thead>
      <tr>
        <th>Username</th>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Email</th>
        <th>Rol</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let u of usuarios">
        <td>{{ u.username }}</td>
        <td>{{ u.nombre }}</td>
        <td>{{ u.apellido }}</td>
        <td>{{ u.email }}</td>
        <td><span class="badge" [class]="u.rol === 'ADMIN' ? 'bg-danger' : u.rol === 'SUPERVISOR' ? 'bg-warning' : 'bg-info'">{{ u.rol }}</span></td>
        <td>
          <span [class]="u.activo ? 'badge bg-success' : 'badge bg-secondary'">
            {{ u.activo ? 'Activo' : 'Inactivo' }}
          </span>
        </td>
        <td>
          <button class="btn btn-sm btn-warning" (click)="openEditModal(u)">Editar</button>
          <button class="btn btn-sm btn-info" (click)="openResetPasswordModal(u)">Reset Pass</button>
          <button class="btn btn-sm btn-danger" (click)="deleteUsuario(u)">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>

  <!-- Create/Edit Modal -->
  <div class="modal" *ngIf="showModal">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5>{{ editingUser ? 'Editar' : 'Nuevo' }} Usuario</h5>
          <button class="btn-close" (click)="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="mb-3" *ngIf="!editingUser">
            <label>Username:</label>
            <input type="text" class="form-control" [(ngModel)]="form.username" />
          </div>
          <div class="mb-3" *ngIf="editingUser">
            <label>Username:</label>
            <input type="text" class="form-control" [value]="form.username" disabled />
          </div>
          <div class="mb-3" *ngIf="!editingUser">
            <label>Password:</label>
            <input type="password" class="form-control" [(ngModel)]="form.password" />
          </div>
          <div class="mb-3">
            <label>Nombre:</label>
            <input type="text" class="form-control" [(ngModel)]="form.nombre" />
          </div>
          <div class="mb-3">
            <label>Apellido:</label>
            <input type="text" class="form-control" [(ngModel)]="form.apellido" />
          </div>
          <div class="mb-3">
            <label>Email:</label>
            <input type="email" class="form-control" [(ngModel)]="form.email" />
          </div>
          <div class="mb-3">
            <label>Rol:</label>
            <select class="form-select" [(ngModel)]="form.rolId">
              <option [ngValue]="1">ADMIN</option>
              <option [ngValue]="2">SUPERVISOR</option>
              <option [ngValue]="3">MIEMBRO_MESA</option>
            </select>
          </div>
          <div class="mb-3">
            <label>
              <input type="checkbox" [(ngModel)]="form.activo" /> Activo
            </label>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" (click)="closeModal()">Cancelar</button>
          <button class="btn btn-primary" (click)="save()">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Reset Password Modal -->
  <div class="modal" *ngIf="showResetModal">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5>Reset Password - {{ resetUser?.username }}</h5>
          <button class="btn-close" (click)="closeResetModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label>Nueva Password:</label>
            <input type="password" class="form-control" [(ngModel)]="newPassword" />
          </div>
          <div class="mb-3">
            <label>Confirmar Password:</label>
            <input type="password" class="form-control" [(ngModel)]="confirmPassword" />
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" (click)="closeResetModal()">Cancelar</button>
          <button class="btn btn-primary" (click)="resetPassword()">Resetear</button>
        </div>
      </div>
    </div>
  </div>
</div>
