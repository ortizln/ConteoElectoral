<div class="container">
  <div class="page-header">
    <h2>Gestión de Parroquias</h2>
    <button class="btn btn-primary btn-with-icon" (click)="openModal()">
      <span class="btn-icon">+</span> Nueva Parroquia
    </button>
  </div>

  <table class="table table-striped">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Cantón</th>
        <th>Descripción</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of parroquias">
        <td>{{ p.nombre }}</td>
        <td>{{ p.cantonNombre }}</td>
        <td>{{ p.descripcion || 'N/A' }}</td>
        <td>
          <button class="btn btn-sm btn-warning" (click)="edit(p)">Editar</button>
          <button class="btn btn-sm btn-danger" (click)="delete(p.id)">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="modal" *ngIf="showModal">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5>{{ editMode ? 'Editar' : 'Nueva' }} Parroquia</h5>
          <button class="btn-close" (click)="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label>Nombre:</label>
            <input type="text" class="form-control" [(ngModel)]="form.nombre" />
          </div>
          <div class="mb-3">
            <label>Cantón:</label>
            <select class="form-select" [(ngModel)]="form.cantonId">
              <option [ngValue]="null">Seleccione...</option>
              <option *ngFor="let c of cantones" [value]="c.id">{{ c.nombre }}</option>
            </select>
          </div>
          <div class="mb-3">
            <label>Descripción:</label>
            <textarea class="form-control" [(ngModel)]="form.descripcion"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" (click)="closeModal()">Cancelar</button>
          <button class="btn btn-primary" (click)="save()">Guardar</button>
        </div>
      </div>
    </div>
  </div>
</div>
