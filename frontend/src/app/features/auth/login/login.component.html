<div class="split-layout">
  <div class="left-panel">
    <div class="login-card">
      <div class="login-header">
        <h2>Conteo Electoral</h2>
        <p>Sistema de Conteo de Votos</p>
      </div>

      <form (ngSubmit)="onSubmit()" class="login-form">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input id="username" type="text" class="form-control" [(ngModel)]="username" name="username"
            placeholder="Ingrese su usuario" required autocomplete="username" />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input id="password" type="password" class="form-control" [(ngModel)]="password" name="password"
            placeholder="Ingrese su contraseña" required autocomplete="current-password" />
        </div>

        <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

        <button type="submit" class="btn btn-login" [disabled]="loading">
          {{ loading ? 'Ingresando...' : 'Ingresar' }}
        </button>
      </form>
    </div>
  </div>

  <div class="right-panel">
    <div class="stars-container">
      <div class="star-layer stars-small"></div>
      <div class="star-layer stars-medium"></div>
      <div class="star-layer stars-large"></div>
      <div class="shooting-star s1"></div>
      <div class="shooting-star s2"></div>
      <div class="shooting-star s3"></div>
    </div>
    <div class="carousel-container">
      <div *ngIf="images.length === 0" class="carousel-empty">
        <div class="carousel-empty-icon">📷</div>
        <p>Bienvenido al Sistema de Conteo Electoral</p>
      </div>

      <div *ngIf="images.length > 0" class="carousel-slides">
        <div *ngFor="let img of images; let i = index" class="carousel-slide"
          [class.active]="i === currentIndex">
          <img [src]="getImageUrl(img.id)" [alt]="img.caption" class="carousel-img" />
        </div>
      </div>

      <div *ngIf="images.length > 0 && images[currentIndex]?.caption" class="carousel-description">
        {{ images[currentIndex].caption }}
      </div>

      <div *ngIf="images.length > 1" class="carousel-dots">
        <button *ngFor="let img of images; let i = index" class="dot"
          [class.active]="i === currentIndex" (click)="goToSlide(i)"></button>
      </div>
    </div>
  </div>
</div>
