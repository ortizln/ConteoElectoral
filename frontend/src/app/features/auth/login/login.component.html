<div class="split-layout">
  <div class="left-panel">
    <div class="login-card">
      <div class="login-header">
        <h2>Conteo Electoral</h2>
        <p>Sistema de Conteo de Votos</p>
      </div>

      <form (ngSubmit)="onSubmit()" class="login-form">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input id="username" type="text" class="form-control" [(ngModel)]="username" name="username"
            placeholder="Ingrese su usuario" required autocomplete="username" />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input id="password" type="password" class="form-control" [(ngModel)]="password" name="password"
            placeholder="Ingrese su contraseña" required autocomplete="current-password" />
        </div>

        <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

        <button type="submit" class="btn btn-login" [disabled]="loading">
          {{ loading ? 'Ingresando...' : 'Ingresar' }}
        </button>
      </form>
      <div class="download-apk">
        <a [href]="apkDownloadUrl" class="apk-card">
          <div class="apk-card-icon">
            <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
              <path d="M17.523 14.143c-.191.726-.577 1.403-1.133 1.942-.674.666-1.462.935-2.373.808-.315-.038-.635-.094-.945-.147-.33-.052-.658-.106-.98-.106-.345 0-.683.057-1.023.113-.408.067-.817.137-1.232.137-.465 0-.927-.062-1.37-.181-2.076-.528-3.515-2.522-3.515-4.802 0-1.143.376-2.204 1.076-3.108.672-.864 1.596-1.416 2.654-1.566.544-.076 1.096-.097 1.648-.068.19.01.38.03.567.052.256.03.512.06.773.06.249 0 .497-.027.743-.054.349-.04.697-.082 1.04-.082.522 0 1.03.065 1.51.218 1.033.316 1.756.975 2.22 1.909-1.383.786-2.082 2.14-2.07 3.892.012 1.574.762 2.859 2.07 3.521v-.01zM12.088 2.077c.051-.704.406-1.323.962-1.773.23-.187.494-.336.78-.436.287-.1.584-.134.88-.103.022.05.044.1.054.152.104.515.204 1.031.21 1.553.011 1.067-.489 2.036-1.358 2.697-.427.325-.92.554-1.45.634-.02-.025-.04-.05-.054-.077-.207-.412-.336-.867-.365-1.339-.027-.407.003-.81.088-1.205.086-.395.215-.779.382-1.14.12-.258.258-.506.37-.763zM13.202.142l-.009-.003-.009.002C13.211.143 13.207.143 13.202.142z"/>
            </svg>
          </div>
          <div class="apk-card-text">
            <span class="apk-card-title">App Móvil</span>
            <span class="apk-card-sub">Descargar APK</span>
          </div>
          <div class="apk-card-arrow">↓</div>
        </a>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="stars-container">
      <div class="star-layer stars-small"></div>
      <div class="star-layer stars-medium"></div>
      <div class="star-layer stars-large"></div>
      <div class="shooting-star s1"></div>
      <div class="shooting-star s2"></div>
      <div class="shooting-star s3"></div>
    </div>
    <div class="carousel-container">
      <div *ngIf="images.length === 0" class="carousel-empty">
        <div class="carousel-empty-icon">📷</div>
        <p>Bienvenido al Sistema de Conteo Electoral</p>
      </div>

      <div *ngIf="images.length > 0" class="carousel-slides">
        <div *ngFor="let img of images; let i = index" class="carousel-slide"
          [class.active]="i === currentIndex">
          <img [src]="getImageUrl(img.id)" [alt]="img.caption" class="carousel-img" />
        </div>
      </div>

      <div *ngIf="images.length > 0 && images[currentIndex]?.caption" class="carousel-description">
        {{ images[currentIndex].caption }}
      </div>

      <div *ngIf="images.length > 1" class="carousel-dots">
        <button *ngFor="let img of images; let i = index" class="dot"
          [class.active]="i === currentIndex" (click)="goToSlide(i)"></button>
      </div>
    </div>
  </div>
</div>
