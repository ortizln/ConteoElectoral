<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h2>Conteo Electoral</h2>
      <p>Sistema de Conteo de Votos</p>
    </div>
    
    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="mb-3">
        <label>Usuario:</label>
        <input type="text" class="form-control" [(ngModel)]="username" name="username" placeholder="Ingrese su usuario" required />
      </div>
      
      <div class="mb-3">
        <label>Contraseña:</label>
        <input type="password" class="form-control" [(ngModel)]="password" name="password" placeholder="Ingrese su contraseña" required />
      </div>
      
      <div class="mb-3" *ngIf="error">
        <div class="alert alert-danger">{{ error }}</div>
      </div>
      
      <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>
  </div>
</div>
