<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div>
        <h2>Conteo Electoral</h2>
        <span class="sidebar-subtitle">Sistema de Votación</span>
      </div>
    </div>

    <div class="user-info">
      <div class="user-avatar">{{ userName[0] || 'U' }}</div>
      <div class="user-details">
        <span class="user-name">{{ userName }}</span>
        <span class="user-role-badge" [class.admin]="userRole === 'ADMIN'" [class.supervisor]="userRole === 'SUPERVISOR'">
          {{ userRole === 'ADMIN' ? 'Administrador' : 'Supervisor' }}
        </span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <span class="nav-section-title">Menú Principal</span>
      <a *ngFor="let item of filteredNavItems"
         [routerLink]="item.path"
         routerLinkActive="active"
         class="nav-item">
        <span class="nav-icon">{{ item.icon }}</span>
        <span class="nav-text">{{ item.label }}</span>
        <span class="nav-indicator"></span>
      </a>
    </nav>

    <div class="extra-links">
      <span class="nav-section-title">Enlaces Rápidos</span>
      <a routerLink="/dashboard" class="nav-item">
        <span class="nav-icon">📊</span>
        <span class="nav-text">Dashboard Electoral</span>
      </a>
      <a routerLink="/mesa" class="nav-item">
        <span class="nav-icon">🗳️</span>
        <span class="nav-text">Módulo de Votación</span>
      </a>
    </div>

    <div class="sidebar-footer">
      <button (click)="logout()" class="btn-logout-sidebar">
        <span>🚪</span> Cerrar Sesión
      </button>
    </div>
  </aside>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
